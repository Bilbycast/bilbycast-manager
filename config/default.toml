# bilbycast-manager configuration
#
# SECRETS: Do NOT put secrets in this file.
# Set them as environment variables or in a .env file:
#
#   BILBYCAST_JWT_SECRET=<random-64-char-hex>
#   BILBYCAST_MASTER_KEY=<random-64-char-hex>
#
# Generate secure values:
#   openssl rand -hex 32

# Server listen port
listen_port = 8443

# SQLite database URL (created automatically if it doesn't exist)
database_url = "sqlite:bilbycast-manager.db?mode=rwc"

# TLS mode: "direct" (default) or "behind_proxy"
#
# "direct" — Manager handles TLS itself. Requires cert+key (see below).
#            Sets Secure cookie flag, sends HSTS headers.
#            Edge/relay nodes connect via wss:// directly to this server.
#
# "behind_proxy" — A load balancer terminates TLS in front of the manager.
#                  No cert/key needed. Manager listens on plain HTTP/WS.
#                  Omits Secure cookie flag and HSTS header.
#                  Edge/relay nodes connect via wss:// to the load balancer.
#                  Only use when LB→manager connection is on a trusted network.
#
# Can also be set via: BILBYCAST_TLS_MODE=behind_proxy
# tls_mode = "direct"

# TLS certificate/key (required in "direct" mode, ignored in "behind_proxy")
# [tls]
# cert_path = "certs/server.crt"
# key_path = "certs/server.key"
# Or use environment variables:
#   BILBYCAST_TLS_CERT=/path/to/cert.pem
#   BILBYCAST_TLS_KEY=/path/to/key.pem
