# bilbycast-manager configuration
#
# SECRETS: Do NOT put secrets in this file.
# Set them as environment variables or in a .env file:
#
#   BILBYCAST_JWT_SECRET=<random-64-char-hex>
#   BILBYCAST_MASTER_KEY=<random-64-char-hex>
#
# Generate secure values:
#   openssl rand -hex 32

# Server listen port
listen_port = 8443

# SQLite database URL (created automatically if it doesn't exist)
database_url = "sqlite:bilbycast-manager.db?mode=rwc"

# TLS configuration (optional — set to enable HTTPS/WSS)
# [tls]
# cert_path = "certs/server.crt"
# key_path = "certs/server.key"
# Or use environment variables:
#   BILBYCAST_TLS_CERT=/path/to/cert.pem
#   BILBYCAST_TLS_KEY=/path/to/key.pem
