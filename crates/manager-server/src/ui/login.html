<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>bilbycast manager - Login</title>
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background-color: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .login-container {
            width: 100%;
            max-width: 400px;
        }

        .login-card {
            background-color: #1e293b;
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 2.5rem 2rem 2rem;
            box-shadow:
                0 4px 6px -1px rgba(0, 0, 0, 0.3),
                0 10px 30px -5px rgba(0, 0, 0, 0.4),
                0 0 0 1px rgba(51, 65, 85, 0.3),
                inset 0 1px 0 rgba(255, 255, 255, 0.03);
        }

        .logo {
            text-align: center;
            margin-bottom: 2rem;
        }

        .logo-text {
            font-size: 2rem;
            font-weight: 700;
            color: #60a5fa;
            letter-spacing: -0.025em;
        }

        .logo-subtitle {
            font-size: 0.875rem;
            color: #94a3b8;
            font-weight: 400;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            margin-top: 0.125rem;
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-label {
            display: block;
            font-size: 0.8125rem;
            font-weight: 500;
            color: #94a3b8;
            margin-bottom: 0.375rem;
        }

        .form-input {
            width: 100%;
            padding: 0.625rem 0.875rem;
            background-color: #0f172a;
            border: 1px solid #334155;
            border-radius: 6px;
            color: #e2e8f0;
            font-size: 0.9375rem;
            font-family: inherit;
            transition: border-color 0.15s ease, box-shadow 0.15s ease;
            outline: none;
        }

        .form-input::placeholder {
            color: #475569;
        }

        .form-input:focus {
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.2);
        }

        .submit-btn {
            width: 100%;
            padding: 0.6875rem 1rem;
            background-color: #2563eb;
            color: #ffffff;
            border: none;
            border-radius: 6px;
            font-size: 0.9375rem;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: background-color 0.15s ease, box-shadow 0.15s ease;
            margin-top: 0.5rem;
        }

        .submit-btn:hover {
            background-color: #1d4ed8;
        }

        .submit-btn:active {
            background-color: #1e40af;
        }

        .submit-btn:focus-visible {
            outline: 2px solid #60a5fa;
            outline-offset: 2px;
        }

        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .error-message {
            display: none;
            margin-top: 1rem;
            padding: 0.625rem 0.875rem;
            background-color: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 6px;
            color: #fca5a5;
            font-size: 0.8125rem;
            text-align: center;
        }

        .error-message.visible {
            display: block;
        }

        .footer {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.75rem;
            color: #475569;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="logo">
                <div class="logo-text">bilbycast</div>
                <div class="logo-subtitle">manager</div>
            </div>
            <form id="login-form" autocomplete="on">
                <div class="form-group">
                    <label class="form-label" for="username">Username</label>
                    <input
                        class="form-input"
                        type="text"
                        id="username"
                        name="username"
                        placeholder="Enter your username"
                        autocomplete="username"
                        required
                        autofocus
                    >
                </div>
                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <input
                        class="form-input"
                        type="password"
                        id="password"
                        name="password"
                        placeholder="Enter your password"
                        autocomplete="current-password"
                        required
                    >
                </div>
                <button class="submit-btn" type="submit" id="submit-btn">Sign In</button>
                <div class="error-message" id="error-message"></div>
            </form>
        </div>
        <div class="footer">Broadcast Monitoring System</div>
    </div>

    <script>
        // Show error from redirect query params
        const params = new URLSearchParams(window.location.search);
        const errorParam = params.get('error');
        if (errorParam) {
            const errorEl = document.getElementById('error-message');
            const msgs = {
                'invalid': 'Invalid username or password',
                'rate_limited': 'Too many login attempts. Try again later.',
                'internal': 'An internal error occurred'
            };
            errorEl.textContent = msgs[errorParam] || 'Authentication failed';
            errorEl.classList.add('visible');
        }

        const form = document.getElementById('login-form');
        const errorEl = document.getElementById('error-message');
        const submitBtn = document.getElementById('submit-btn');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorEl.classList.remove('visible');
            submitBtn.disabled = true;
            submitBtn.textContent = 'Signing in\u2026';

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;

            try {
                const res = await fetch('/api/v1/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password }),
                });

                if (!res.ok) {
                    let msg = 'Authentication failed';
                    try {
                        const data = await res.json();
                        if (data.error) msg = data.error;
                    } catch (_) {}
                    throw new Error(msg);
                }

                const data = await res.json();
                // Set cookies via JavaScript to guarantee they're stored
                // (some browsers don't process Set-Cookie from fetch with self-signed certs)
                if (data.token) {
                    document.cookie = 'session=' + data.token + '; SameSite=Lax; Path=/; Max-Age=86400';
                }
                if (data.csrf_token) {
                    document.cookie = 'csrf_token=' + data.csrf_token + '; SameSite=Lax; Path=/; Max-Age=86400';
                }
                window.location.href = '/dashboard';
            } catch (err) {
                errorEl.textContent = err.message || 'An unexpected error occurred';
                errorEl.classList.add('visible');
                submitBtn.disabled = false;
                submitBtn.textContent = 'Sign In';
            }
        });
    </script>
</body>
</html>
